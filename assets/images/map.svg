<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" role="img" aria-label="더컨벤션 송파문정 약도 (8호선 문정역 3번 출구 도보 5분)">
  <rect width="720" height="470" fill="#f6f1e8"/>

  <!-- 도로 -->
  <g fill="none" stroke-linecap="round">
    <!-- 송파대로 (대로) -->
    <line x1="512" y1="-20" x2="612" y2="490" stroke="#e7dcc8" stroke-width="46"/>
    <!-- 일반 도로 -->
    <line x1="40" y1="222" x2="512" y2="214" stroke="#ece3d3" stroke-width="16"/>
    <line x1="250" y1="40" x2="250" y2="440" stroke="#ece3d3" stroke-width="16"/>
    <line x1="40" y1="120" x2="470" y2="112" stroke="#efe7d8" stroke-width="10"/>
  </g>
  <text transform="translate(578 250) rotate(79)" font-family="sans-serif" font-size="17" letter-spacing="2" fill="#b6a98c">송파대로</text>

  <!-- 문정역 3번 출구 (상단) -->
  <g font-family="sans-serif">
    <rect x="470" y="34" width="120" height="30" rx="15" fill="#d84f8c"/>
    <text x="530" y="54" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">8호선 문정역</text>
    <circle cx="470" cy="96" r="9" fill="#fff" stroke="#d84f8c" stroke-width="3"/>
    <text x="452" y="101" text-anchor="end" fill="#d84f8c" font-size="15" font-weight="700">3번 출구</text>
  </g>

  <!-- 도보 경로 -->
  <path d="M470 108 Q405 165 366 205" fill="none" stroke="#c9a26b" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round"/>
  <text x="404" y="150" fill="#a8824b" font-family="sans-serif" font-size="15" font-weight="700">도보 5분</text>

  <!-- 랜드마크 -->
  <g font-family="sans-serif" font-size="15" fill="#8b8378">
    <circle cx="300" cy="118" r="5" fill="#c9b48f"/>
    <text x="312" y="123">하나은행</text>
    <circle cx="418" cy="158" r="5" fill="#c9b48f"/>
    <text x="430" y="163">신한은행</text>
    <circle cx="150" cy="288" r="5" fill="#c9b48f"/>
    <text x="150" y="312" text-anchor="middle">서울동부지방법원</text>
    <circle cx="516" cy="410" r="5" fill="#c9b48f"/>
    <text x="506" y="415" text-anchor="end">NC백화점</text>
  </g>

  <!-- 예식장 핀 -->
  <g transform="translate(356 208)">
    <path d="M0 30 C-22 0 -17 -28 0 -28 C17 -28 22 0 0 30 Z" fill="#c9a26b"/>
    <circle cx="0" cy="-15" r="8" fill="#f6f1e8"/>
  </g>
  <text x="356" y="262" text-anchor="middle" fill="#8a6d3b" font-family="serif" font-size="20" letter-spacing="1" font-weight="700">THE CONVENTION</text>
  <text x="356" y="286" text-anchor="middle" fill="#6f6a63" font-family="sans-serif" font-size="16">더컨벤션 송파문정</text>

  <!-- 장지역 4번 출구 (하단) -->
  <g font-family="sans-serif">
    <rect x="486" y="372" width="120" height="30" rx="15" fill="#d84f8c"/>
    <text x="546" y="392" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">8호선 장지역</text>
    <circle cx="486" cy="356" r="9" fill="#fff" stroke="#d84f8c" stroke-width="3"/>
    <text x="468" y="361" text-anchor="end" fill="#d84f8c" font-size="15" font-weight="700">4번 출구</text>
  </g>
</svg>
